<style>
    .subscribe-button{
        background-color:rgb(200, 0, 0);
        color:white;
        border:none;
        height:50px;
        width:105px;
        border-radius:6px;
        cursor:pointer;
        margin-right:12px;
        font-size:20px;
        transition:opacity 0.15s;
    }

    .subscribe-button:hover{
        opacity:0.8;
    }

    .subscribe-button:active{
        opacity:0.5;
    }
</style>

<button class="subscribe-button">
    Subscribe
</button>

<button class="join-button">
    Join
</button>

<style>
    .join-button{
        background-color:white;
        border-color:rgb(3, 3, 216);
        border-style:solid;
        height:50px;
        width:100px;
        border-width:2px;
        color:rgb(3, 3, 216);
        border-radius:6px;
        cursor:pointer;
        margin-right:10px;
        font-size:20px;
        transition:background-color 0.15s, color 0.15s;
    }

    .join-button:hover{
        background-color:rgb(3, 3, 216);
        color:white;
    }

    .join-button:active{
        opacity:0.7;
    }

    .tweet-button{
        background-color:rgb(0, 153, 255);
        color:white;
        border:none;
        height:50px;
        width:110px;
        border-radius:25px;
        font-weight:bold;
        cursor:pointer;
        font-size:20px;
        transition:box-shadow 0.15s;
    }

    .tweet-button:hover{
        box-shadow:5px 5px 10px rgba(0,0,0,0.15);
    }
</style>

<button class="tweet-button">
    Tweet
</button>
