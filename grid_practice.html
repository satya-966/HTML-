<!DOCTYPE html>
<html>
    <head>
        <title>GRID practice</title>
        <style>
            .video-info-grid{
                display:grid;
                grid-template-columns:1fr 1fr 1fr;
                column-gap:20px;
                row-gap:20px;
            }
        </style>
    </head>
    <body>
        <div class="video-info-grid">
            <div style="background-color:lightblue; height:200px;">
                1st div
            </div>
            <div style="background-color:lightgreen; height:200px;">
                2nd div
            </div>
            <div style="background-color:lightblue; height:200px;">
                3rd div
            </div>
            <div style="background-color:lightgreen; height:200px;">
                4th div
            </div>
            <div style="background-color:lightblue; height:200px;">
                5th div
            </div>
            <div style="background-color:lightgreen; height:200px;">
                6th div
            </div>
        </div>
    </body>
</html>
