<!DOCTYPE html>
<html>
    <head>

        <title>Youtube.com clone</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

        <style>

            p{
                font-family:Roboto,Arial;
                margin-top:0;
                margin-bottom:0;
            }
            .thumbnail{
                width:300px;
            }
            .search-bar{
                display:block;
            }
            .video-title{
                font-size:12px;
                font-weight:bold;
                line-height:16px;
                margin-bottom:12px;
            }
            .video-preview{
                width:300px;
                display:inline-block;
                vertical-align:top;
                margin-right:15px;
            }
            .channel-picture{
                display:inline-block;
                width:50px;
                vertical-align:top;
            }
            .video-info{
                display:inline-block;
                width:200px;
            }
            .profile-picture{
                width:40px;
                border-radius:50px;
            }
            .thumbnail-row{
                margin-bottom:12px;
            }
            .video-author{
                font-size:12px;
                color:rgb(96,96,96);
                margin-bottom:6;
            }
            .video-stats{
                font-size:12px;
                color:rgb(96,96,96);
            }
        </style>

    </head>

    <body>
        <input class="search-bar" type="text" placeholder="Search">

        <div class="video-preview">

            <div class="thumbnail-row"><img class="thumbnail"src="thumbnails/thumbnail-1.webp"></div>
            <div>
                <div class="channel-picture">
                    <img class="profile-picture" src="profiles/channel-1.jpeg">
                </div>
                <div class="video-info">
            <p class="video-title">Talking Tech and AI with Google CEO Sundar Pichai!</p>
            <p class="video-author">Marques Brownlee</p>
            <p class="video-stats">3.4M views &#183; 6 months ago</p>
                </div>
            </div>
        </div>

        <div class="video-preview">

            <div class="thumbnail-row"><img class="thumbnail"src="thumbnails/thumbnail-2.webp"></div>
            <div>
                <div class="channel-picture">
                    <img class="profile-picture" src="profiles/channel-2.jpeg">
                </div>
                <div class="video-info">
            <p class="video-title">Try Not To Laugh Challenge #9</p>
            <p class="video-author">Markiplier</p>
            <p class="video-stats">19M views &#183; 4 years ago</p>
                </div>
            </div>
        </div>


    </body>

</html>
