<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox Example</title>
    </head>
    <body>
        <div style="display:flex;
         flex-direction:row">
            <div style="background-color:lightblue; width:100px;">1st div</div>
            <div style="background-color:lightpink; flex:1;">2nd div</div>
        </div>

        <div style="
            margin-top:30px;
            height:70px;
            border-width:1px;
            border-style:solid;
            border-color:gray;

            display:flex;
            flex-direction:row;
            justify-content:start;
            align-items:top;
            ">

            <div style="background-color:lightblue; width:100px;">100px</div>
            <div style="background-color:lightpink; width:100px;">100px</div>
            <div style="background-color:lightblue; width:100px;">100px</div>
        </div>

         <div style="
            margin-top:30px;
            height:70px;
            border-width:1px;
            border-style:solid;
            border-color:gray;

            display:flex;
            flex-direction:row;
            justify-content:end;
            align-items:top;
            ">

            <div style="background-color:lightblue; width:100px;">100px</div>
            <div style="background-color:lightpink; width:100px;">100px</div>
            <div style="background-color:lightblue; width:100px;">100px</div>
        </div>

         <div style="
            margin-top:30px;
            height:70px;
            border-width:1px;
            border-style:solid;
            border-color:gray;

            display:flex;
            flex-direction:row;
            justify-content:center;
            align-items:bottom;
            ">

            <div style="background-color:lightblue; width:100px;">100px</div>
            <div style="background-color:lightpink; width:100px;">100px</div>
            <div style="background-color:lightblue; width:100px;">100px</div>
        </div>

         <div style="
            margin-top:30px;
            height:70px;
            border-width:1px;
            border-style:solid;
            border-color:gray;

            display:flex;
            flex-direction:row;
            justify-content:space-between;
            align-items:center;
            ">

            <div style="background-color:lightblue; width:100px;">100px</div>
            <div style="background-color:lightpink; width:100px;">100px</div>
            <div style="background-color:lightblue; width:100px;">100px</div>
        </div>
    </body>
</html>
